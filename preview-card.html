<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Card Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background:#111; display:flex; justify-content:center; padding:40px; min-height:100vh; margin:0; }
    canvas { max-width:450px; width:100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
document.fonts.ready.then(render)

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y)
  ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r)
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h)
  ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r)
  ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.closePath()
}

function render() {
  const W = 900, H = 1200   // 3:4
  const c = document.getElementById('c')
  c.width = W; c.height = H
  const ctx = c.getContext('2d')

  // ── Background: degradê tom sobre tom (azul navy) ───────────
  const bgG = ctx.createLinearGradient(0, 0, W, H)
  bgG.addColorStop(0,    '#0F2340')   // navy médio — canto superior esquerdo
  bgG.addColorStop(0.40, '#07111F')   // navy muito escuro — centro-esquerda
  bgG.addColorStop(0.60, '#060E1C')   // navy mais profundo — centro-direita
  bgG.addColorStop(1,    '#0D1D36')   // navy médio-escuro — canto inferior direito
  ctx.fillStyle = bgG
  ctx.fillRect(0,0,W,H)

  // Linhas diagonais quase invisíveis (tom sobre tom, azul levemente mais claro)
  ctx.save()
  ctx.strokeStyle = 'rgba(30,80,160,0.10)'
  ctx.lineWidth = 1
  for (let i = -H; i < W + H; i += 44) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke()
  }
  ctx.restore()

  // ── Barras topo/rodapé (gradiente metálico) ──────────────────
  const barG = ctx.createLinearGradient(0,0,W,0)
  barG.addColorStop(0,   '#7A5C10')
  barG.addColorStop(0.25,'#C9A227')
  barG.addColorStop(0.5, '#F0C84A')
  barG.addColorStop(0.75,'#C9A227')
  barG.addColorStop(1,   '#7A5C10')
  ctx.fillStyle = barG
  ctx.fillRect(0, 0, W, 8)
  ctx.fillRect(0, H-8, W, 8)

  // ── SINDPOL box ───────────────────────────────────────────────
  roundRect(ctx, 185, 22, 530, 52, 4)
  ctx.fillStyle = 'rgba(201,162,39,0.07)'; ctx.fill()
  ctx.strokeStyle = 'rgba(201,162,39,0.32)'; ctx.lineWidth = 1; ctx.stroke()
  ctx.fillStyle = '#FFFFFF'
  ctx.font = '500 21px "Oswald", sans-serif'
  ctx.textAlign = 'center'
  ctx.letterSpacing = '0.12em'
  ctx.fillText('SINDPOL-RJ — ELEIÇÕES 2026', W/2, 54)
  ctx.letterSpacing = '0'

  // ── EU APOIO (gradiente, sem glow) ────────────────────────────
  const euG = ctx.createLinearGradient(0,105,0,210)
  euG.addColorStop(0,   '#FBE89A')
  euG.addColorStop(0.45,'#C9A227')
  euG.addColorStop(1,   '#8B6914')
  ctx.fillStyle = euG
  ctx.font = 'bold 106px "Oswald", sans-serif'
  ctx.letterSpacing = '0.16em'
  ctx.fillText('EU APOIO', W/2, 200)
  ctx.letterSpacing = '0'

  // Linha fade sob EU APOIO
  const lnG = ctx.createLinearGradient(130,0,W-130,0)
  lnG.addColorStop(0,  'rgba(201,162,39,0)')
  lnG.addColorStop(0.5,'rgba(201,162,39,0.9)')
  lnG.addColorStop(1,  'rgba(201,162,39,0)')
  ctx.strokeStyle = lnG; ctx.lineWidth = 2
  ctx.beginPath(); ctx.moveTo(130,218); ctx.lineTo(W-130,218); ctx.stroke()

  // ── Badge CHAPA 3 ─────────────────────────────────────────────
  const bW=240, bH=50, bX=(W-bW)/2
  roundRect(ctx, bX, 234, bW, bH, 4)
  const bG = ctx.createLinearGradient(bX,0,bX+bW,0)
  bG.addColorStop(0,   '#7A5C10')
  bG.addColorStop(0.35,'#C9A227')
  bG.addColorStop(0.5, '#F0C84A')
  bG.addColorStop(0.65,'#C9A227')
  bG.addColorStop(1,   '#7A5C10')
  ctx.fillStyle = bG; ctx.fill()
  ctx.fillStyle = '#0B1929'
  ctx.font = 'bold 36px "Oswald", sans-serif'
  ctx.letterSpacing = '0.20em'
  ctx.textBaseline = 'middle'
  ctx.fillText('CHAPA  3', W/2, 234 + bH/2 + 3)
  ctx.textBaseline = 'alphabetic'
  ctx.letterSpacing = '0'

  // ── GESTÃO (branco limpo, sem shadow) ────────────────────────
  ctx.fillStyle = '#FFFFFF'
  ctx.font = 'bold 158px "Oswald", sans-serif'
  ctx.letterSpacing = '0.04em'
  ctx.fillText('GESTÃO', W/2, 460)
  ctx.letterSpacing = '0'

  // ── & LUTA (gradiente dourado, sem glow) ─────────────────────
  const ltG = ctx.createLinearGradient(0,480,0,608)
  ltG.addColorStop(0,   '#FBE89A')
  ltG.addColorStop(0.45,'#C9A227')
  ltG.addColorStop(1,   '#8B6914')
  ctx.fillStyle = ltG
  ctx.font = 'bold 140px "Oswald", sans-serif'
  ctx.letterSpacing = '0.04em'
  ctx.fillText('& LUTA', W/2, 608)
  ctx.letterSpacing = '0'

  // ── Divisor ornamental ────────────────────────────────────────
  const dvG = ctx.createLinearGradient(100,0,W-100,0)
  dvG.addColorStop(0,   'rgba(201,162,39,0)')
  dvG.addColorStop(0.4, 'rgba(201,162,39,0.5)')
  dvG.addColorStop(0.5, 'rgba(201,162,39,0.9)')
  dvG.addColorStop(0.6, 'rgba(201,162,39,0.5)')
  dvG.addColorStop(1,   'rgba(201,162,39,0)')
  ctx.strokeStyle = dvG; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(100,634); ctx.lineTo(W-100,634); ctx.stroke()

  // Diamond
  ctx.save(); ctx.translate(W/2, 647); ctx.rotate(Math.PI/4)
  ctx.fillStyle = '#C9A227'
  ctx.fillRect(-6,-6,12,12)
  ctx.restore()

  // ── Slogan ────────────────────────────────────────────────────
  ctx.fillStyle = '#6A7888'
  ctx.font = '500 22px "Oswald", sans-serif'
  ctx.letterSpacing = '0.10em'
  ctx.fillText('GESTÃO PARA ORGANIZAR | LUTA PARA VENCER', W/2, 704)
  ctx.letterSpacing = '0'

  // ── Caixa Data ────────────────────────────────────────────────
  const eX=(W-560)/2, eY=720, eW=560, eH=70
  roundRect(ctx, eX, eY, eW, eH, 5)
  ctx.fillStyle = 'rgba(201,162,39,0.08)'; ctx.fill()
  ctx.strokeStyle = 'rgba(201,162,39,0.5)'; ctx.lineWidth = 1.5; ctx.stroke()

  const tlG = ctx.createLinearGradient(eX,0,eX+eW,0)
  tlG.addColorStop(0,  'rgba(201,162,39,0)')
  tlG.addColorStop(0.5,'rgba(240,200,74,0.9)')
  tlG.addColorStop(1,  'rgba(201,162,39,0)')
  ctx.fillStyle = tlG
  ctx.fillRect(eX+20, eY, eW-40, 2)

  ctx.fillStyle = '#C9A227'
  ctx.font = '500 16px "Oswald", sans-serif'
  ctx.letterSpacing = '0.15em'
  ctx.fillText('DIA DA ELEIÇÃO', W/2, 748)

  ctx.fillStyle = '#FFFFFF'
  ctx.font = 'bold 27px "Oswald", sans-serif'
  ctx.letterSpacing = '0.08em'
  ctx.fillText('09 DE MAIO DE 2026  ·  9H30', W/2, 780)
  ctx.letterSpacing = '0'

  // ── Candidatos ────────────────────────────────────────────────
  const spG = ctx.createLinearGradient(100,0,W-100,0)
  spG.addColorStop(0,  'rgba(201,162,39,0)')
  spG.addColorStop(0.3,'rgba(201,162,39,0.4)')
  spG.addColorStop(0.7,'rgba(201,162,39,0.4)')
  spG.addColorStop(1,  'rgba(201,162,39,0)')
  ctx.strokeStyle = spG; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(100,866); ctx.lineTo(W-100,866); ctx.stroke()

  // Luiz Cláudio
  ctx.fillStyle = '#FFFFFF'
  ctx.font = 'bold 40px "Oswald", sans-serif'
  ctx.letterSpacing = '0.05em'
  ctx.fillText('LUIZ CLÁUDIO', W/2, 912)
  ctx.fillStyle = '#C9A227'
  ctx.font = '500 18px "Oswald", sans-serif'
  ctx.letterSpacing = '0.16em'
  ctx.fillText('PRESIDENTE', W/2, 936)
  ctx.letterSpacing = '0'

  // mini sep
  const msG = ctx.createLinearGradient((W-80)/2,0,(W+80)/2,0)
  msG.addColorStop(0,  'rgba(201,162,39,0)')
  msG.addColorStop(0.5,'rgba(201,162,39,0.5)')
  msG.addColorStop(1,  'rgba(201,162,39,0)')
  ctx.strokeStyle = msG; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo((W-80)/2,953); ctx.lineTo((W+80)/2,953); ctx.stroke()

  // Márcia Bezerra
  ctx.fillStyle = '#FFFFFF'
  ctx.font = 'bold 40px "Oswald", sans-serif'
  ctx.letterSpacing = '0.05em'
  ctx.fillText('MÁRCIA BEZERRA', W/2, 996)
  ctx.fillStyle = '#C9A227'
  ctx.font = '500 18px "Oswald", sans-serif'
  ctx.letterSpacing = '0.16em'
  ctx.fillText('VICE-PRESIDENTE', W/2, 1020)
  ctx.letterSpacing = '0'

  ctx.strokeStyle = spG; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(100,1036); ctx.lineTo(W-100,1036); ctx.stroke()

  // ── CTA ───────────────────────────────────────────────────────
  const ctaX=175, ctaY=1053, ctaW=550, ctaH=62
  roundRect(ctx, ctaX, ctaY, ctaW, ctaH, 4)
  const ctaG = ctx.createLinearGradient(ctaX,0,ctaX+ctaW,0)
  ctaG.addColorStop(0,   '#7A5C10')
  ctaG.addColorStop(0.3, '#C9A227')
  ctaG.addColorStop(0.5, '#F0C84A')
  ctaG.addColorStop(0.7, '#C9A227')
  ctaG.addColorStop(1,   '#7A5C10')
  ctx.fillStyle = ctaG; ctx.fill()
  ctx.fillStyle = '#0B1929'
  ctx.font = 'bold 25px "Oswald", sans-serif'
  ctx.letterSpacing = '0.14em'
  ctx.fillText('VENHA VOTAR TAMBÉM!', W/2, 1093)
  ctx.letterSpacing = '0'

  // ── URL ───────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(201,162,39,0.5)'
  ctx.font = '500 16px "Oswald", sans-serif'
  ctx.letterSpacing = '0.06em'
  ctx.fillText('gestao-e-luta.vercel.app', W/2, 1138)
  ctx.letterSpacing = '0'
}
</script>
</body>
</html>
